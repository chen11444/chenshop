<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Shop của Demi Chen</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #ff6b81; color: white; padding: 15px; text-align: center; }
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    .product { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .product img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
    .product h3 { margin: 10px 0; }
    .product button { background: #ff6b81; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    .cart { position: fixed; right: 20px; top: 20px; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

<header>
  <h1>🛍️ Shop của Demi Chen</h1>
</header>

<div class="cart">
  🛒 Giỏ hàng: <span id="cart-count">0</span>
</div>

<div class="container">
  <div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Sản phẩm 1</h3>
    <p>100.000đ</p>
    <button onclick="addToCart()">Mua</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Sản phẩm 2</h3>
    <p>150.000đ</p>
    <button onclick="addToCart()">Mua</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Sản phẩm 3</h3>
    <p>200.000đ</p>
    <button onclick="addToCart()">Mua</button>
  </div>
</div>

<script>
  let count = 0;
  function addToCart() {
    count++;
    document.getElementById('cart-count').innerText = count;
  }
</script>

</body>
</html>
